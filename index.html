<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ML Plugin — Ecosystem Map</title>
  <link rel="stylesheet" href="css/style.css">
</head>

<body>

  <header>
    <div class="wordmark"><span>ML</span> · Ecosystem Map</div>
    <div class="header__meta">4 systems · file structure</div>
  </header>

  <nav id="site-nav" aria-label="Site navigation">
    <!-- filled by nav.js -->
  </nav>

  <div class="scroll-container" id="scroll-container">

    <section class="scroll-section" id="ecosystem">
      <div class="ecosystem-split">

        <div class="ecosystem-split__treemap">
          <div class="grid grid--2x2" id="canvas">
            <!-- filled by main.js -->
          </div>
          <svg id="flow-svg"></svg>
        </div>

        <div class="ecosystem-split__panel" id="ecosystem-panel">
          <!-- filled by main.js -->
        </div>

      </div>
    </section>

    <section class="scroll-section" id="flow">
      <div class="intro-section__inner">
        <div class="section-label">Data flow</div>
        <div id="flow-detail">
          <!-- filled by flow.js -->
        </div>
      </div>
    </section>

  </div>

  <div class="tooltip" id="tooltip">
    <div class="tooltip__path" id="tt-path"></div>
    <div class="tooltip__name" id="tt-name"></div>
    <div class="tooltip__files">Files: <span id="tt-files"></span></div>
  </div>

  <nav class="nav-bar" id="nav-bar" aria-label="Section navigation">
    <!-- filled by nav.js -->
  </nav>

  <script src="javascript/nav.js"></script>
  <script src="javascript/main.js"></script>
  <script src="javascript/flow.js"></script>

</body>

</html>
