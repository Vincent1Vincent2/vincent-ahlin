<!DOCTYPE html>
<html lang="en">

<head>

  <title>ML Plugin — Capability Map</title>
  <link rel="stylesheet" href="css/style.css">
</head>

<body>

  <header>
    <div class="wordmark"><span>ML</span> · Capability Map</div>
    <div class="header__meta">Drawn from file structure · 4 systems</div>
  </header>

  <nav id="site-nav" aria-label="Site navigation">
    <!-- filled by nav.js -->
  </nav>

  <div class="scroll-container" id="scroll-container">

    <section class="scroll-section" id="capabilities">
      <div class="grid grid--1x1">
        <div class="grid grid--3col" id="cap-grid">
          <!-- filled by main.js -->
        </div>
      </div>
    </section>

    <section class="scroll-section" id="architecture">
      <div class="intro-section__inner">
        <div class="section-label">System breakdown</div>
        <div class="grid grid--4col" id="arch-grid">
          <!-- filled by main.js -->
        </div>
      </div>
    </section>

  </div>

  <nav class="nav-bar" id="nav-bar" aria-label="Section navigation">
    <!-- filled by nav.js -->
  </nav>

  <script src="javascript/nav.js"></script>
  <script src="javascript/main.js"></script>

</html>
