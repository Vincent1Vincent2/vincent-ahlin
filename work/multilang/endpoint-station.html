<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ML Plugin — Ecosystem Map</title>
  <link rel="stylesheet" href="../../css/style.css">
  <link rel="stylesheet" href="css/api.css">
  <link rel="stylesheet" href="css/flow.css">
</head>

<body>

  <header>
    <div class="wordmark"><span>ML</span> · Ecosystem Map</div>
    <nav id="header-nav" aria-label="Site navigation"></nav>
    <div class="header__meta">4 systems · live connections</div>
  </header>

  <nav id="site-nav" aria-label="Site navigation">
    <!-- filled by nav.js -->
  </nav>

  <!-- ── SECTION 1: API NETWORK ───────────────────────────────────────── -->
  <section class="section-stage" id="api">
    <div class="hero__fixed">
      <h1 class="hero__title">Endpoint station</h1>
      <p class="hero__desc">Click a system to explore its API connections. Each line is a real endpoint in production.
      </p>
    </div>
    <div id="api-detail" class="api-detail">
      <!-- filled by api.js -->
    </div>
  </section>

  <!-- ── SECTION 2: DATA FLOW ─────────────────────────────────────────── -->
  <section class="section-detail" id="section-detail">
    <div class="detail-card" id="detail-card">
      <!-- filled by flow.js via api.js discover -->
    </div>
  </section>

  <!-- ── SECTION 3: FILE STRUCTURE ────────────────────────────────────── 
  <section class="scroll-section" id="ecosystem">
    <div class="grid grid--2x2" id="canvas">
      filled by main.js
    </div>
    <svg id="flow-svg"></svg>
  </section> -->

  <div class="tooltip" id="tooltip">
    <div class="tooltip__path" id="tt-path"></div>
    <div class="tooltip__name" id="tt-name"></div>
    <div class="tooltip__files">Files: <span id="tt-files"></span></div>
  </div>

  <!-- BACK BUTTON -->
  <button class="back-btn" id="back-btn">
    <svg viewBox="0 0 24 24">
      <polyline points="18 15 12 9 6 15" />
    </svg>
    Back
  </button>


  <script src="../../javascript/header-nav.js"></script>
  <script src="../../javascript/side-nav.js"></script>
  <script src="javascript/flow.js"></script>
  <script src="javascript/api.js"></script>

</body>

</html>
