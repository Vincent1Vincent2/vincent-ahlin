<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Capability Cabinet</title>
  <link rel="stylesheet" href="../../css/style.css">
  <link rel="stylesheet" href="css/cabinet.css">
  <script src="javascript/cabinet.js" defer></script>
</head>

<body>

  <header>
    <div class="wordmark"><span>ML</span> · Capability cabinet</div>
    <nav id="header-nav" aria-label="Site navigation"></nav>
    <div class="header__meta">Drawn from file structure · 4 systems</div>
  </header>

  <nav id="site-nav" aria-label="Site navigation">
    <!-- filled by nav.js -->
  </nav>

  <!-- SECTION 1: Cabinet -->
  <section class="section-stage" id="section-cabinet">
    <div class="hero__fixed">
      <h1 class="hero__title">Capability Cabinet</h1>
      <p class="hero__desc">Explore the capabilities that makes up parts of each system & get a deeper understanding of
        their structure.</p>
    </div>
    <div class="scene">
      <div class="cabinet">
        <div class="cabinet__top"></div>
        <div class="cabinet__side"></div>
        <div class="cabinet__front" id="cabinet-front"></div>
        <div class="cabinet__foot"></div>
      </div>
    </div>
    <p class="hint">Click a drawer, then a file</p>
  </section>

  <!-- SECTION 2: Detail -->
  <section class="section-detail" id="section-detail">
    <div class="detail-card" id="detail-card">
      <div class="detail-card__label" id="detail-label"></div>
      <div class="detail-card__title" id="detail-title"></div>
      <div class="detail-card__body">— content goes here —</div>
    </div>
  </section>

  <!-- BACK BUTTON -->
  <button class="back-btn" id="back-btn">
    <svg viewBox="0 0 24 24">
      <polyline points="18 15 12 9 6 15" />
    </svg>
    Back
  </button>

  <script src="../../javascript/header-nav.js"></script>
  <script src="../../javascript/side-nav.js"></script>
</body>

</html>
