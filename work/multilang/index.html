<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ML Plugin — Project Overview</title>
  <link rel="stylesheet" href="../../css/style.css">
</head>

<body>

  <!-- ── HEADER ────────────────────────────────────────────────────────────── -->
  <header>
    <div class="wordmark"><span>ML</span> · MultiLang</div>
    <div class="header__meta">SaaS Ecosystem · 4 Systems</div>
  </header>

  <!-- ── SITE NAV (sidebar) ────────────────────────────────────────────────── -->
  <nav id="site-nav" aria-label="Site navigation">
    <!-- filled by nav.js -->
  </nav>

  <!-- ── SCROLL CONTAINER ──────────────────────────────────────────────────── -->
  <div class="scroll-container" id="scroll-container">

    <!-- ── HERO — snap section 1 ───────────────────────────────────────────── -->
    <section id="hero" class="scroll-section">

      <div class="hero__top">
        <div class="hero__eyebrow">Solo Project · 2024</div>
        <h1 class="hero__title">Multi<span>Lang</span></h1>
        <p class="hero__sub" id="hero-tagline"></p>
      </div>

      <div class="hero__stats" id="hero-stats">
        <!-- filled by intro.js -->
      </div>

      <nav class="hero__pills" id="nav-pills" aria-label="Project sections">
        <!-- filled by nav.js -->
      </nav>

    </section>

    <!-- ── CONTENT SECTIONS — snap sections 2…n ────────────────────────────── -->
    <!-- intro.js appends .intro-section elements directly here -->

  </div>

  <!-- ── BOTTOM NAV BAR ────────────────────────────────────────────────────── -->
  <nav class="nav-bar" id="nav-bar" aria-label="Section navigation">
    <!-- filled by nav.js -->
  </nav>

  <script src="../../javascript/side-nav.js"></script>
  <script src="javascript/intro.js"></script>

</body>

</html>
